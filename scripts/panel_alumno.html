      // ==========================================================

      const SOLICITUDES_DB_ID = 15;      // DATAID of "Db Solicitudes de ayuda"

      const sesskey = window.M?.cfg?.sesskey || document.querySelector('input[name="sesskey"]')?.value || "";

      let currentUserId = window.M?.cfg?.userid || "";
      let currentUserFullName = "Estudiante";
      let currentUserAvatarHtml = "";
      
      let solicitudActiva = null; // { rid15, rid22, descripcion, fecha, estado: 'pendiente'|'atendida' }

      // Show/Hide loading overlay
      function showLoading(text) {
        const overlay = document.getElementById("loading-overlay");
        const loadingText = document.getElementById("loading-text");
        loadingText.textContent = text;
        overlay.style.display = "flex";
      }

      function hideLoading() {
        document.getElementById("loading-overlay").style.display = "none";
      }

      // Show status message with transient display
      function showStatus(text, type = "success") {
        const msgEl = document.getElementById("status-message");
        msgEl.className = "status-text";
        if (type === "success") msgEl.classList.add("text-success");
        else if (type === "danger") msgEl.classList.add("text-danger");
        else if (type === "warning") msgEl.classList.add("text-warning");
        
        msgEl.textContent = text;
        msgEl.style.display = "block";
        
        // Auto-hide after 6 seconds
        setTimeout(() => {
          msgEl.style.display = "none";
        }, 6000);
      }

      // Parse Moodle date strings to JS Date objects
      function parseMoodleDate(str) {
        if (!str) return new Date(0);
        try {
          const meses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
          const clean = str.replace(/de/g, "").replace(/,/g, "").replace(/\s+/g, " ").trim();
          const parts = clean.split(" ");
          
          // Remove weekday name if present
          if (isNaN(parseInt(parts[0], 10))) {
            parts.shift();
          }
          
          const dia = parseInt(parts[0], 10);
          const mesIndex = meses.indexOf(parts[1].toLowerCase());
          const anio = parseInt(parts[2], 10);
          const h = parts[3].split(":");
          
          return new Date(anio, mesIndex, dia, parseInt(h[0], 10), parseInt(h[1], 10));
        } catch (e) {
          console.error("Error parsing Moodle date:", str, e);
          return new Date(str);
        }
      }

      // Normalize labels
      const normLabel = (str) => str.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

      // Get logged-in user profile details (avatar and name) directly from Moodle globals and header DOM (no network requests)
      function fetchCurrentUserProfile() {
        const userTextEl = document.querySelector(".usertext");
        if (window.M?.cfg?.userfullname) {
          currentUserFullName = window.M.cfg.userfullname;
        } else if (userTextEl) {
          currentUserFullName = userTextEl.textContent.trim();
        }

        if (window.M?.cfg?.userid) {
          currentUserId = String(window.M.cfg.userid);
        } else {
          const profileLink = document.querySelector("a[href*='/user/profile.php'], a[href*='/user/view.php']");
          if (profileLink) {
            const m = profileLink.getAttribute("href").match(/id=(\d+)/);
            if (m) currentUserId = m[1];
          }
        }

        const imgEl = document.querySelector(".userbutton img.userpicture");
        if (imgEl) {
          currentUserAvatarHtml = `<div class="user-pic-wrapper">${imgEl.outerHTML}</div>`;
        } else {
          currentUserAvatarHtml = `<div class="userinitials">${currentUserFullName.substring(0, 2).toUpperCase()}</div>`;
        }

        const avatarContainer = document.getElementById("student-avatar");
        const nameContainer = document.getElementById("student-name");
        if (avatarContainer) avatarContainer.innerHTML = currentUserAvatarHtml;
        if (nameContainer) nameContainer.textContent = currentUserFullName;
      }

      // Read active and historical requests for the student
      async function loadStudentRequestStatus() {
        showLoading("Comprobando el estado de tus solicitudes...");
        solicitudActiva = null;

        try {
          // Parallel fetch to pending requests (d=15) and history (d=22) utilizing user ID search filter
          const [resSoli, resHistorial] = await Promise.all([
            fetch(`${window.location.origin}/mod/data/view.php?d=${SOLICITUDES_DB_ID}&search=${encodeURIComponent(currentUserId)}`).then(r => r.text()),
            fetch(`${window.location.origin}/mod/data/view.php?d=${HISTORIAL_DB_ID}&search=${encodeURIComponent(currentUserId)}`).then(r => r.text())
          ]);

          // A. Process pending requests in d=15
          const parserSoli = new DOMParser();
          const docSoli = parserSoli.parseFromString(resSoli, "text/html");
          let entriesSoli = Array.from(docSoli.querySelectorAll(".defaulttemplate-listentry, #defaulttemplate-single, .defaulttemplate-single, #data-listview-content .card, #data-singleview-content .card, .defaulttemplate-single-body"));
          
          // Filter entries created by the current user
          entriesSoli = entriesSoli.filter(entry => {
            const userLink = entry.querySelector("a[href*='user/view.php']");
            if (!userLink) return false;
            const matchUser = userLink.getAttribute("href").match(/id=(\d+)/);
            if (!matchUser || matchUser[1] !== currentUserId) return false;

            const hasAction = entry.querySelector("a[href*='delete='], a[href*='rid='], a[href*='edit.php']");
            return !!hasAction;
          });

          let solicitudPendiente = null;
          if (entriesSoli.length > 0) {
            const entry = entriesSoli[0];
            let rid = null;
            const deleteLink = entry.querySelector("a[href*='delete=']");
            if (deleteLink) {
              const m = deleteLink.getAttribute("href").match(/delete=(\d+)/);
              if (m) rid = m[1];
            }
            if (!rid) {
              const editLink = entry.querySelector("a[href*='rid=']");
              if (editLink) {
                const m = editLink.getAttribute("href").match(/rid=(\d+)/);
                if (m) rid = m[1];
              }
            }

            const descEl = entry.querySelector(".data-field-html");
            const descripcionText = descEl ? descEl.textContent.trim() : "";

            const timeEl = entry.querySelector(".data-timeinfo span[title]");
            const fechaText = timeEl ? timeEl.getAttribute("title") : (entry.querySelector(".data-timeinfo")?.textContent?.trim() || "Recientemente");
            
            solicitudPendiente = {
              rid: rid,
              descripcion: descripcionText || "Sin descripción",
              fecha: fechaText,
              estado: "pendiente"
            };
          }

          // B. Process historical requests in d=22
          const parserHistorial = new DOMParser();
          const docHistorial = parserHistorial.parseFromString(resHistorial, "text/html");
          let entriesHistorial = Array.from(docHistorial.querySelectorAll(".defaulttemplate-listentry, #defaulttemplate-single, .defaulttemplate-single, #data-listview-content .card, #data-singleview-content .card, .defaulttemplate-single-body"));
          
          // Filter entries matching currentUserId in either custom id_alumno field or author link
          entriesHistorial = entriesHistorial.filter(entry => {
            const rows = entry.querySelectorAll("tr, .fitem, .form-group, div, p");
            let matchesUser = false;
            for (let row of rows) {
              const labelEl = row.querySelector(".font-weight-bold, label, th, dt");
              if (!labelEl) continue;
              const labelText = normLabel(labelEl.textContent);

              if (labelText.includes("id_alumno") || labelText.includes("id alumno")) {
                const valueEl = row.querySelector("td, dd, span:not(.font-weight-bold)");
                const valueText = (valueEl ? valueEl.textContent : row.textContent).replace(labelEl.textContent, "").trim();
                if (valueText === currentUserId) {
                  matchesUser = true;
                  break;
                }
              }
            }

            if (!matchesUser) {
              const userLink = entry.querySelector("a[href*='user/view.php']");
              if (userLink) {
                const matchUser = userLink.getAttribute("href").match(/id=(\d+)/);
                if (matchUser && matchUser[1] === currentUserId) {
                  matchesUser = true;
                }
              }
            }
            return matchesUser;
          });

          let solicitudAtendida = null;
          if (entriesHistorial.length > 0) {
            let masRecienteEntry = null;
            let maxFecha = null;

            entriesHistorial.forEach(entry => {
              const timeEl = entry.querySelector(".data-timeinfo span[title]");
              const fechaText = timeEl ? timeEl.getAttribute("title") : (entry.querySelector(".data-timeinfo")?.textContent?.trim() || "");
              if (fechaText) {
                const d = parseMoodleDate(fechaText);
                if (!maxFecha || d > maxFecha) {
                  maxFecha = d;
                  masRecienteEntry = entry;
                }
              }
            });

            if (masRecienteEntry) {
              const desc22El = masRecienteEntry.querySelector(".data-field-html");
              const solicitudOriginal = desc22El ? desc22El.textContent.trim() : "Consulta de ayuda";

              const timeEl = masRecienteEntry.querySelector(".data-timeinfo span[title]");
              const fechaText = timeEl ? timeEl.getAttribute("title") : (masRecienteEntry.querySelector(".data-timeinfo")?.textContent?.trim() || "Recientemente");

              let rid22 = null;
              const deleteLink22 = masRecienteEntry.querySelector("a[href*='delete=']");
              if (deleteLink22) {
                const m = deleteLink22.getAttribute("href").match(/delete=(\d+)/);
                if (m) rid22 = m[1];
              }

              solicitudAtendida = {
                rid: rid22,
                solicitudOriginal: solicitudOriginal || "Consulta de ayuda",
                fecha: fechaText,
                estado: "atendida"
              };
            }
          }

          // C. Resolve final state with dual RIDs
          if (solicitudPendiente && solicitudAtendida) {
            solicitudActiva = {
              estado: "pendiente",
              rid15: solicitudPendiente.rid,
              rid22: solicitudAtendida.rid,
              descripcion: solicitudPendiente.descripcion,
              fecha: solicitudPendiente.fecha
            };
          } else if (solicitudPendiente) {
            solicitudActiva = {
              estado: "pendiente",
              rid15: solicitudPendiente.rid,
              rid22: null,
              descripcion: solicitudPendiente.descripcion,
              fecha: solicitudPendiente.fecha
            };
          } else if (solicitudAtendida) {
            solicitudActiva = {
              estado: "atendida",
              rid15: null,
              rid22: solicitudAtendida.rid,
              solicitudOriginal: solicitudAtendida.solicitudOriginal,
              fecha: solicitudAtendida.fecha
            };
          } else {
            solicitudActiva = null;
          }

          renderUI();
          hideLoading();
        } catch (e) {
          console.error("Error loading requests:", e);
          showStatus("❌ Error al obtener tus datos. Por favor recarga la página.", "danger");
          hideLoading();
        }
      }

      // Render UI based on resolved state
      function renderUI() {
        const card = document.getElementById("status-card");
        const icon = document.getElementById("status-icon");
        const title = document.getElementById("status-title");
        const desc = document.getElementById("status-desc");
        const actionSec = document.getElementById("action-section");

        card.className = "card-status";

        if (!solicitudActiva) {
          // Case A: No active requests
          card.classList.add("card-status-empty");
          icon.textContent = "ℹ️";
          title.textContent = "Sin Solicitudes Activas";
          desc.textContent = "No tienes solicitudes de asistencia pendientes en este cuatrimestre. Si estás teniendo dificultades académicas, puedes enviarle una consulta a los tutores completando el formulario a continuación.";

          actionSec.innerHTML = `
            <form id="form-solicitud" style="display: flex; flex-direction: column; gap: 14px;">
              <div class="form-group">
                <label for="input-descripcion" class="form-label">Describe brevemente tu situación o motivo de consulta</label>
                <textarea id="input-descripcion" class="form-textarea" required placeholder="Ej: Necesito apoyo con la materia Análisis Matemático 1..."></textarea>
              </div>
              <button type="submit" id="btn-enviar" class="btn-action">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                Enviar Solicitud de Ayuda
              </button>
            </form>
          `;

          document.getElementById("form-solicitud").addEventListener("submit", handleCreateRequest);

        } else if (solicitudActiva.estado === "pendiente") {
          // Case B: Pending request
          card.classList.add("card-status-pending");
          icon.textContent = "⏳";
          title.textContent = "Solicitud Pendiente de Atención";
          desc.innerHTML = `
            Tu solicitud fue enviada el <strong>${solicitudActiva.fecha}</strong>.<br><br>
            <span style="font-style: italic; color: #555;">"Motivo: ${solicitudActiva.descripcion}"</span><br><br>
            Un tutor revisará tu caso y te contactará a través de la mensajería interna de Moodle.
          `;

          actionSec.innerHTML = `
            <button type="button" id="btn-cancelar" class="btn-action btn-danger">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
              Dar de Baja Solicitud
            </button>
          `;

          document.getElementById("btn-cancelar").addEventListener("click", handleDeleteRequest);

        } else if (solicitudActiva.estado === "atendida") {
          // Case C: Attended request
          card.classList.add("card-status-approved");
          icon.textContent = "✅";
          title.textContent = "Solicitud Atendida";
          desc.innerHTML = `
            Tu solicitud de ayuda anterior (enviada el <strong>${solicitudActiva.fecha}</strong>) ya ha sido procesada y <strong>atendida</strong> por el equipo de tutores.<br><br>
            <strong>Tu consulta original:</strong><br>
            <span style="font-style: italic; color: #555;">"${solicitudActiva.solicitudOriginal}"</span><br><br>
            Un tutor te habrá contactado por medio de la mensajería interna de Moodle.<br><br>
            Si requieres una nueva asistencia académica, puedes crear una nueva solicitud a continuación.
          `;

          actionSec.innerHTML = `
            <form id="form-solicitud" style="display: flex; flex-direction: column; gap: 14px;">
              <div class="form-group">
                <label for="input-descripcion" class="form-label">Nueva consulta o situación a describir</label>
                <textarea id="input-descripcion" class="form-textarea" required placeholder="Describe aquí la nueva ayuda que necesitas..."></textarea>
              </div>
              <button type="submit" id="btn-enviar" class="btn-action">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                Enviar Nueva Solicitud
              </button>
            </form>
          `;

          document.getElementById("form-solicitud").addEventListener("submit", handleCreateRequest);
        }
      }

      // Create new request
      async function handleCreateRequest(e) {
        e.preventDefault();
        
        const descText = document.getElementById("input-descripcion").value.trim();
        if (!descText) return;

        if (!sesskey) {
          showStatus("❌ No se pudo validar la firma de sesión Moodle (sesskey). Por favor recarga la página.", "danger");
          return;
        }

        showLoading("Enviando tu solicitud...");

        try {
          // If there is an old history record in d=22, delete it directly first (no database scan loop)
          if (solicitudActiva && solicitudActiva.rid22) {
            showLoading("Limpiando registro anterior...");
            const deleteForm = new FormData();
            deleteForm.append("d", HISTORIAL_DB_ID.toString());
            deleteForm.append("delete", solicitudActiva.rid22);
            deleteForm.append("confirm", "1");
            deleteForm.append("sesskey", sesskey);

            await fetch(`${window.location.origin}/mod/data/view.php`, {
              method: "POST",
              body: deleteForm,
              credentials: "include",
              redirect: "manual"
            });
            console.log("[DEBUG] Borrada entrada previa de d=22, rid:", solicitudActiva.rid22);
          }

          showLoading("Obteniendo formularios...");
          const parser = new DOMParser();

          // 1. Fetch form for requests (d=15) and map fields dynamically
          const formRes = await fetch(`${window.location.origin}/mod/data/edit.php?d=${SOLICITUDES_DB_ID}`);
          if (!formRes.ok) throw new Error("No se pudo obtener el formulario de solicitudes (d=15).");

          const formHtml = await formRes.text();
          const docForm = parser.parseFromString(formHtml, "text/html");

          let fieldName = "field_41"; // Default fallback
          const fontWeights = docForm.querySelectorAll(".font-weight-bold, label, legend");
          for (let label of fontWeights) {
            const text = normLabel(label.textContent);
            if (text.includes("descripcion")) {
              const parent = label.closest("div") || label.parentElement;
              const inputEl = parent.querySelector("textarea, input[type='text']");
              if (inputEl) {
                fieldName = inputEl.getAttribute("name");
                break;
              }
            }
          }

          // 1.5. Fetch form for history (d=22) and map fields dynamically
          const form22Res = await fetch(`${window.location.origin}/mod/data/edit.php?d=${HISTORIAL_DB_ID}`);
          if (!form22Res.ok) throw new Error("No se pudo obtener el formulario de historial (d=22).");
          
          const form22Html = await form22Res.text();
          const docForm22 = parser.parseFromString(form22Html, "text/html");

          const fields22Mapeo = {};
          const label22Elements = docForm22.querySelectorAll("label[for]");
          label22Elements.forEach(label => {
            const text = normLabel(label.textContent);
            const inputId = label.getAttribute("for");
            const inputEl = docForm22.getElementById(inputId) || docForm22.querySelector('[name="' + inputId + '"]');
            if (inputEl) {
              const fieldName = inputEl.getAttribute("name");
              if (fieldName) {
                if (text.includes("id_alumno") || text.includes("id alumno")) {
                  fields22Mapeo.id_alumno = fieldName;
                } else if (text.includes("solicitud_original") || text.includes("solicitud original") || text.includes("solicitud")) {
                  fields22Mapeo.solicitud_original = fieldName;
                }
              }
            }
          });

          // Fallback mapping for d=22
          if (!fields22Mapeo.id_alumno) {
            const wrapperRows = docForm22.querySelectorAll("#defaulttemplate-addentry > div, .form-group, .fitem");
            wrapperRows.forEach(row => {
              const label = row.querySelector(".font-weight-bold, label, .col-form-label");
              if (label) {
                const labelText = normLabel(label.textContent);
                const input = row.querySelector("input[name], textarea[name], select[name]");
                if (input) {
                  const fieldName = input.getAttribute("name");
                  if (fieldName) {
                    if (labelText.includes("id_alumno") || labelText.includes("id alumno")) {
                      fields22Mapeo.id_alumno = fieldName;
                    } else if (labelText.includes("solicitud_original") || labelText.includes("solicitud original") || labelText.includes("solicitud")) {
                      fields22Mapeo.solicitud_original = fieldName;
                    }
                  }
                }
              }
            });
          }

          // 2. Build FormData for requests (d=15)
          const formEl = docForm.querySelector("form[action*='edit.php']") || docForm.querySelector("form");
          if (!formEl) throw new Error("No se encontró el formulario contenedor de solicitudes (d=15).");

          const formData = new FormData();
          const inputs = formEl.querySelectorAll("input, textarea, select");
          inputs.forEach(input => {
            const name = input.getAttribute("name");
            if (!name) return;
            if (input.type === "submit" || input.type === "button") return;
            if ((input.type === "checkbox" || input.type === "radio") && !input.checked) return;
            formData.set(name, input.value || "");
          });

          formData.set("d", SOLICITUDES_DB_ID.toString());
          formData.set("rid", "0");
          formData.set("sesskey", sesskey);
          formData.set(fieldName, descText);
          formData.set("saveandview", "Guardar");

          // 2.5. Build FormData for history (d=22)
          const form22El = docForm22.querySelector("form[action*='edit.php']") || docForm22.querySelector("form");
          if (!form22El) throw new Error("No se encontró el formulario contenedor de historial (d=22).");

          const formData22 = new FormData();
          const inputs22 = form22El.querySelectorAll("input, textarea, select");
          inputs22.forEach(input => {
            const name = input.getAttribute("name");
            if (!name) return;
            if (input.type === "submit" || input.type === "button") return;
            if ((input.type === "checkbox" || input.type === "radio") && !input.checked) return;
            formData22.set(name, input.value || "");
          });

          formData22.set("d", HISTORIAL_DB_ID.toString());
          formData22.set("rid", "0");
          formData22.set("sesskey", sesskey);
          if (fields22Mapeo.id_alumno) {
            formData22.set(fields22Mapeo.id_alumno, currentUserId || "");
          }
          if (fields22Mapeo.solicitud_original) {
            formData22.set(fields22Mapeo.solicitud_original, descText);
          }
          formData22.set("saveandview", "Guardar");

          // 3. POST to d=15 and d=22 in parallel
          showLoading("Enviando solicitudes...");
          const [postRes, post22Res] = await Promise.all([
            fetch(`${window.location.origin}/mod/data/edit.php?d=${SOLICITUDES_DB_ID}`, {
              method: "POST",
              body: formData,
              credentials: "include"
            }),
            fetch(`${window.location.origin}/mod/data/edit.php?d=${HISTORIAL_DB_ID}`, {
              method: "POST",
              body: formData22,
              credentials: "include"
            })
          ]);

          // Validate responses
          const [responseText, response22Text] = await Promise.all([
            postRes.text(),
            post22Res.text()
          ]);

          const docPost = parser.parseFromString(responseText, "text/html");
          const hasForm = docPost.querySelector('form#mform1, form[action*="edit.php"]') !== null;
          if (hasForm) {
            const errorEl = docPost.querySelector('.errormsg, .error, .alert-danger');
            let errorMsg = "Fallo de validación en Moodle para solicitudes (d=15).";
            if (errorEl) errorMsg += ` Detalle: ${errorEl.textContent.trim()}`;
            throw new Error(errorMsg);
          }

          const doc22Post = parser.parseFromString(response22Text, "text/html");
          const has22Form = doc22Post.querySelector('form#mform1, form[action*="edit.php"]') !== null;
          if (has22Form) {
            const error22El = doc22Post.querySelector('.errormsg, .error, .alert-danger');
            let errorMsg = "Fallo de validación en Moodle para historial (d=22).";
            if (error22El) errorMsg += ` Detalle: ${error22El.textContent.trim()}`;
            throw new Error(errorMsg);
          }

          showStatus("✅ Solicitud enviada correctamente.", "success");
          await loadStudentRequestStatus();

        } catch (e) {
          console.error("Error creating request:", e);
          showStatus(`❌ No se pudo guardar la solicitud. ${e.message || "Verifica tu sesión Moodle."}`, "danger");
          hideLoading();
        }
      }

      // Delete (Dar de baja) active request from both d=15 and d=22
      async function handleDeleteRequest() {
        if (!solicitudActiva) return;

        if (!confirm("¿Estás seguro de que deseas dar de baja tu solicitud de asistencia activa?")) {
          return;
        }

        showLoading("Cancelando tu solicitud...");

        try {
          const deletePromises = [];

          // Delete from d=15
          if (solicitudActiva.rid15) {
            const deleteForm = new FormData();
            deleteForm.append("d", SOLICITUDES_DB_ID.toString());
            deleteForm.append("delete", solicitudActiva.rid15);
            deleteForm.append("confirm", "1");
            deleteForm.append("sesskey", sesskey);
            
            deletePromises.push(
              fetch(`${window.location.origin}/mod/data/view.php`, {
                method: "POST",
                body: deleteForm,
                credentials: "include"
              })
            );
          }

          // Delete from d=22
          if (solicitudActiva.rid22) {
            const deleteForm22 = new FormData();
            deleteForm22.append("d", HISTORIAL_DB_ID.toString());
            deleteForm22.append("delete", solicitudActiva.rid22);
            deleteForm22.append("confirm", "1");
            deleteForm22.append("sesskey", sesskey);

            deletePromises.push(
              fetch(`${window.location.origin}/mod/data/view.php`, {
                method: "POST",
                body: deleteForm22,
                credentials: "include"
              })
            );
          }

          if (deletePromises.length > 0) {
            await Promise.all(deletePromises);
          }

          showStatus("✅ Solicitud cancelada correctamente.", "success");
          await loadStudentRequestStatus();

        } catch (e) {
          console.error("Error deleting request:", e);
          showStatus("❌ No se pudo cancelar la solicitud. Intenta nuevamente.", "danger");
          hideLoading();
        }
      }

      // Initialize student panel details
      async function initPanel() {
        // Toggle Moodle navigation visibility
        const btnToggleMoodle = document.getElementById("btn-toggle-moodle-nav");
        if (btnToggleMoodle) {
          const isStudent = document.body.classList.contains("role-student");
          if (isStudent) {
            btnToggleMoodle.style.display = "none";
          } else {
            btnToggleMoodle.addEventListener("click", () => {
              const isHidden = document.body.classList.contains("hide-moodle-navigation");
              if (isHidden) {
                document.body.classList.remove("hide-moodle-navigation");
                btnToggleMoodle.textContent = "Ocultar Configuración de Actividad";
              } else {
                document.body.classList.add("hide-moodle-navigation");
                btnToggleMoodle.textContent = "Mostrar Configuración de Actividad";
              }
            });
          }
        }

        // Fetch profile details and load request status
        fetchCurrentUserProfile();
        await loadStudentRequestStatus();
        document.getElementById("panel-content").style.display = "block";
      }

      // Run immediately
      initPanel();

    })();
  </script>
</p>
